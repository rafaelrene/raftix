[tools]
age = "1.3.1"
bats = "1.13.0"
jq = "1.8.1"
markdownlint-cli2 = "0.22.1"
prettier = "3.8.3"
shellcheck = "0.11.0"
shfmt = "3.13.1"
taplo = "0.10.0"
yq = "4.53.2"

[tasks.fmt]
description = "Format project files"
run = [
  "shfmt -w scripts/raftix scripts/raftix-install scripts/build-iso scripts/lib/common.sh",
  "taplo format .mise.toml",
  "prettier --write \"**/*.{md,yml,yaml,json}\"",
]

[tasks.lint]
description = "Lint project files"
run = [
  "shellcheck scripts/raftix scripts/raftix-install scripts/build-iso scripts/lib/common.sh",
  "taplo check .mise.toml",
  "markdownlint-cli2 \"**/*.md\"",
  "prettier --check \"**/*.{md,yml,yaml,json}\"",
]

[tasks.test]
description = "Run tests"
run = [
  "bash -n scripts/raftix scripts/raftix-install scripts/build-iso scripts/lib/common.sh",
  "sh -c 'test ! -d tests || bats tests'",
]

[tasks.build-iso]
description = "Build ISO"
run = ["./scripts/build-iso"]
