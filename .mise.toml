[tools]
age = "1.3.1"
bats = "1.13.0"
jq = "1.8.1"
markdownlint-cli2 = "0.22.1"
prettier = "3.8.3"
shellcheck = "0.11.0"
shfmt = "3.13.1"
taplo = "0.10.0"
task = "3.50.0"
yq = "4.53.2"

[tasks.fmt]
description = "Format project files"
run = [
  "sh -c 'files=$(find . -type f -name \"*.sh\" -not -path \"./.git/*\"); test -z \"$files\" || shfmt -w $files'",
  "taplo format .mise.toml",
  "prettier --write \"**/*.{md,yml,yaml,json}\"",
]

[tasks.lint]
description = "Lint project files"
run = [
  "sh -c 'files=$(find . -type f -name \"*.sh\" -not -path \"./.git/*\"); test -z \"$files\" || shellcheck $files'",
  "taplo check .mise.toml",
  "markdownlint-cli2 \"**/*.md\"",
  "prettier --check \"**/*.{md,yml,yaml,json}\"",
]

[tasks.test]
description = "Run tests"
run = "sh -c 'test ! -d tests || bats tests'"
